<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect x="5" y="5" width="90" height="90" rx="22" fill="#0F172A" />
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)" />

  <!-- Чёткая, жирная буква H -->
  <!-- Левая вертикаль -->
  <rect x="28" y="28" width="12" height="44" rx="6" fill="url(#hGrad)" />
  
  <!-- Правая вертикаль -->
  <rect x="60" y="28" width="12" height="44" rx="6" fill="url(#hGrad)" />
  
  <!-- Горизонтальная перекладина -->
  <rect x="28" y="44" width="44" height="12" rx="6" fill="url(#hGrad)" />

  <!-- Лёгкий акцент — маленький кружок справа внизу, как намёк на движение -->
  <circle cx="78" cy="78" r="4" fill="#38BDF8" opacity="0.6" />
</svg>